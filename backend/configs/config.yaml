# MemBrowser 配置文件
# api_key 不在 yaml 中写入，由环境变量 MEMBROWSER_<TIER>_API_KEY 覆盖
# auth_key 同理，由 MEMBROWSER_AUTH_KEY 覆盖
port: 8080
db_path: ./data/membrowser.db
data_dir: ./data
log_level: debug

haiku:
  base_url: https://coding.dashscope.aliyuncs.com/v1
  model: kimi-k2.5

sonnet:
  base_url: https://coding.dashscope.aliyuncs.com/v1
  model: glm-5

opus:
  base_url: https://coding.dashscope.aliyuncs.com/v1
  model: qwen3.6-plus
